name: Actualizar Calendario ICS

on:
  schedule:
    - cron: '0 3 * * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v6 

      - name: Descargar HTML público del Calendario
        run: |
          curl "https://vicalvablog.com/events-calendar/" \
            -H "accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,image/apng,*/*;q=0.8" \
            -H "accept-language: es-ES,es;q=0.9" \
            -H "user-agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -o agenda_publica.html --silent || echo "Error en la descarga"

      - name: Configurar Node.js
        uses: actions/setup-node@v6 
        with:
          node-version: '24' 

      - name: Extraer eventos y generar ICS
        run: node generar.js

      - name: Guardar y subir cambios al repositorio
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add agenda.ics
          git diff-index --quiet HEAD || git commit -m "Auto: Sincronización de eventos de Vicálvaro"
          git push
